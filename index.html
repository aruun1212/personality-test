<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>留步，你有话说</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --bg-primary: #0a0a0f;
  --bg-card: #14141f;
  --bg-card-hover: #1a1a2e;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a0;
  --text-dim: #555570;
  --neon-purple: #a855f7;
  --neon-blue: #6366f1;
  --neon-pink: #ec4899;
  --neon-cyan: #06b6d4;
  --gradient-main: linear-gradient(135deg, #a855f7, #6366f1, #ec4899);
  --gradient-dark: linear-gradient(135deg, #7c3aed, #4f46e5);
  --shadow-neon: 0 0 20px rgba(168, 85, 247, 0.3);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
.section { display: none; min-height: 100vh; padding: 20px; max-width: 420px; margin: 0 auto; }
.section.active { display: flex; flex-direction: column; }

/* ========== Landing Page ========== */
#landing { justify-content: center; align-items: center; text-align: center; gap: 30px; }
.landing-icon { font-size: 64px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.landing-title {
  font-size: 28px; font-weight: 800;
  background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.4;
}
.landing-subtitle { color: var(--text-secondary); font-size: 15px; line-height: 1.6; }
.landing-meta { color: var(--text-dim); font-size: 13px; display: flex; gap: 16px; justify-content: center; }
.btn-start {
  background: var(--gradient-main); color: white; border: none; padding: 16px 48px;
  border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer;
  box-shadow: var(--shadow-neon); transition: all 0.3s; letter-spacing: 2px;
}
.btn-start:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(168, 85, 247, 0.5); }
.btn-start:active { transform: scale(0.98); }

/* ========== Quiz Page ========== */
#quiz { justify-content: flex-start; padding-top: 40px; }
.progress-bar-wrap { width: 100%; margin-bottom: 30px; }
.progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); }
.progress-track { width: 100%; height: 4px; background: #1e1e30; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--gradient-main); border-radius: 2px; transition: width 0.4s ease; }
.question-container { flex: 1; display: flex; flex-direction: column; }
.question-scenario {
  font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 24px;
  min-height: 80px; opacity: 1; transition: opacity 0.3s;
}
.question-scenario.fade-out { opacity: 0; }
.options-list { display: flex; flex-direction: column; gap: 12px; }
.option-btn {
  background: var(--bg-card); border: 1px solid #2a2a3e; border-radius: var(--radius-sm);
  padding: 16px 20px; font-size: 15px; color: var(--text-primary); cursor: pointer;
  text-align: left; line-height: 1.4; transition: all 0.2s; position: relative; overflow: hidden;
}
.option-btn:hover { background: var(--bg-card-hover); border-color: var(--neon-purple); }
.option-btn:active { transform: scale(0.98); }
.option-btn.selected {
  border-color: var(--neon-purple); background: rgba(168, 85, 247, 0.15);
  box-shadow: 0 0 12px rgba(168, 85, 247, 0.2);
}

/* Navigation buttons (prev) */
.quiz-nav { display: flex; justify-content: flex-start; margin-top: 20px; }
.btn-prev {
  background: none; border: 1px solid #2a2a3e; color: var(--text-secondary);
  padding: 10px 20px; border-radius: 50px; font-size: 13px; cursor: pointer;
  transition: all 0.2s; display: none;
}
.btn-prev.visible { display: inline-flex; align-items: center; gap: 6px; }
.btn-prev:hover { border-color: var(--neon-purple); color: var(--text-primary); }

/* ========== Loading Page ========== */
#loading { justify-content: center; align-items: center; text-align: center; gap: 30px; }
.loading-icon { font-size: 48px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
.loading-text { font-size: 20px; font-weight: 600; }
.loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
@keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
.loading-sub { color: var(--text-secondary); font-size: 14px; }

/* ========== Result Page ========== */
#result { justify-content: flex-start; padding-top: 30px; padding-bottom: 40px; gap: 24px; }
.result-header { text-align: center; }
.result-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
.result-surface-os {
  font-size: 24px; font-weight: 800; line-height: 1.4;
  background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; padding: 8px 0;
}
.result-surface-desc { color: var(--text-secondary); font-size: 14px; line-height: 1.8; margin-top: 12px; }
.result-card {
  background: var(--bg-card); border-radius: var(--radius); padding: 24px;
  border: 1px solid #2a2a3e;
}

/* Dark OS reveal */
.dark-os-wrap { position: relative; cursor: pointer; overflow: hidden; min-height: 120px; }
.dark-os-content { transition: filter 0.6s, opacity 0.6s; }
.dark-os-content.hidden { filter: blur(8px); opacity: 0.3; user-select: none; }
.dark-os-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; justify-content: center; align-items: center;
  background: rgba(10, 10, 15, 0.5); border-radius: var(--radius);
  transition: opacity 0.6s; z-index: 2;
}
.dark-os-overlay.revealed { opacity: 0; pointer-events: none; }
.dark-os-hint {
  color: var(--neon-pink); font-size: 14px; font-weight: 600;
  padding: 10px 20px; border: 1px solid var(--neon-pink); border-radius: 50px;
  animation: pulse 2s ease-in-out infinite;
}
.result-dark-os {
  font-size: 20px; font-weight: 700; color: var(--neon-pink); margin-bottom: 8px;
}
.result-dark-prefix { color: var(--text-dim); font-size: 13px; margin-bottom: 4px; font-style: italic; }
.result-dark-desc { color: var(--text-secondary); font-size: 14px; line-height: 1.8; }
.dark-type-badge {
  display: inline-block; margin-top: 10px; padding: 4px 12px;
  border-radius: 50px; font-size: 12px; color: var(--neon-pink);
  border: 1px solid rgba(236, 72, 153, 0.3); background: rgba(236, 72, 153, 0.1);
}

/* Radar chart */
.radar-wrap { display: flex; justify-content: center; padding: 10px 0; }
#radarCanvas { max-width: 100%; }

/* Dark index bars */
.dark-index-section { display: flex; flex-direction: column; gap: 12px; }
.dark-index-item { display: flex; flex-direction: column; gap: 4px; }
.dark-index-label { display: flex; justify-content: space-between; font-size: 13px; }
.dark-index-name { color: var(--text-secondary); }
.dark-index-value { color: var(--text-primary); font-weight: 600; }
.dark-index-track { height: 6px; background: #1e1e30; border-radius: 3px; overflow: hidden; }
.dark-index-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
.dark-index-fill.narcissism { background: linear-gradient(90deg, #a855f7, #c084fc); }
.dark-index-fill.machiavellianism { background: linear-gradient(90deg, #6366f1, #818cf8); }
.dark-index-fill.chaos { background: linear-gradient(90deg, #ec4899, #f472b6); }
.dark-index-fill.total { background: var(--gradient-main); }
.dominant-badge {
  font-size: 11px; color: var(--neon-pink); padding: 1px 8px;
  border: 1px solid rgba(236, 72, 153, 0.3); border-radius: 50px; margin-left: 6px;
}

/* Buttons */
.btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
.btn-share {
  background: var(--gradient-main); color: white; border: none; padding: 14px;
  border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.3s;
}
.btn-share:hover { box-shadow: var(--shadow-neon); }
.btn-secondary {
  background: var(--bg-card); color: var(--text-primary); border: 1px solid #2a2a3e;
  padding: 14px; border-radius: var(--radius-sm); font-size: 15px; cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--neon-purple); }
.btn-restart { background: none; color: var(--text-dim); border: none; font-size: 14px; cursor: pointer; padding: 10px; }
.btn-restart:hover { color: var(--text-secondary); }

/* Share card (hidden template) */
#shareCardTemplate {
  position: fixed; left: -9999px; top: 0; width: 375px;
  box-sizing: border-box;
  background: var(--bg-primary); padding: 30px 24px; font-family: inherit;
  overflow: visible;
}
/* Share card preview modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-content { max-width: 375px; width: 100%; text-align: center; }
.modal-content img { width: 100%; border-radius: var(--radius); margin-bottom: 16px; }
.modal-hint { color: var(--text-secondary); font-size: 13px; margin-bottom: 12px; }
.modal-close {
  background: none; border: 1px solid #555; color: var(--text-secondary);
  padding: 8px 24px; border-radius: 50px; cursor: pointer; font-size: 14px;
}

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--bg-card); color: var(--text-primary); padding: 12px 24px;
  border-radius: 50px; font-size: 14px; border: 1px solid #2a2a3e;
  opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ========== Landing Page ========== -->
<div id="landing" class="section active">
  <div class="landing-icon">🤓☝️</div>
  <h1 class="landing-title">留步，你有话说</h1>
  <p class="landing-subtitle">基于大五人格 × 暗黑三角的双面人格测试<br>找到你的表面OS和暗面OS</p>
  <div class="landing-meta"><span>⏱️ 约2分钟（还不够上班摸个鱼的）</span></div>
  <button class="btn-start" onclick="startQuiz()">开始灵魂扫描</button>
  <div style="color: var(--text-dim); font-size: 12px; margin-top: 4px;">作者：<a href="https://github.com/aruun1212" target="_blank" style="color: var(--neon-purple); text-decoration: none;">GitHub@aruun1212</a></div>
</div>

<!-- ========== Quiz Page ========== -->
<div id="quiz" class="section">
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="progressText">1 / 36</span>
      <span id="progressPercent">3%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:3%"></div></div>
  </div>
  <div class="question-container">
    <div class="question-scenario" id="questionText"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="quiz-nav">
      <button class="btn-prev" id="btnPrev" onclick="prevQuestion()">← 上一题</button>
    </div>
  </div>
</div>

<!-- ========== Loading Page ========== -->
<div id="loading" class="section">
  <div class="loading-icon">🧬</div>
  <div class="loading-text">灵魂扫描中<span class="loading-dots"></span></div>
  <div class="loading-sub">正在解码你的内心OS...</div>
</div>

<!-- ========== Result Page ========== -->
<div id="result" class="section">
  <div class="result-header">
    <div class="result-label">☀️ 你的内心OS</div>
    <div class="result-surface-os" id="surfaceOS"></div>
  </div>
  <div class="result-card">
    <div class="result-surface-desc" id="surfaceDesc"></div>
  </div>

  <div class="result-card dark-os-wrap" id="darkOsWrap" onclick="revealDarkOS()">
    <div class="dark-os-overlay" id="darkOverlay"><span class="dark-os-hint">🌑 点击揭示你的暗面</span></div>
    <div class="dark-os-content hidden" id="darkContent">
      <div class="result-dark-prefix" id="darkPrefix"></div>
      <div class="result-dark-os" id="darkOS"></div>
      <div class="result-dark-desc" id="darkDesc"></div>
      <div class="dark-type-badge" id="darkTypeBadge"></div>
    </div>
  </div>

  <div class="result-card">
    <div class="result-label" style="margin-bottom:12px">📊 大五人格雷达</div>
    <div class="radar-wrap"><canvas id="radarCanvas" width="300" height="300"></canvas></div>
  </div>

  <div class="result-card">
    <div class="result-label" style="margin-bottom:16px">🔻 暗黑指数</div>
    <div class="dark-index-section" id="darkIndexSection"></div>
  </div>

  <div class="btn-group">
    <button class="btn-share" onclick="generateShareCard()">📸 生成分享卡片</button>
    <button class="btn-secondary" onclick="copyShareText()">📋 复制结果文案</button>
    <button class="btn-restart" onclick="restartQuiz()">🔄 重新测试</button>
  </div>
</div>

<!-- Share Card Template (hidden, for html2canvas) -->
<div id="shareCardTemplate">
  <div style="text-align:center;margin-bottom:20px">
    <div style="font-size:13px;color:#8888a0">☀️ 我的内心OS</div>
    <div id="shareOS" style="font-size:22px;font-weight:800;color:#e8e8f0;margin:10px 0;line-height:1.4"></div>
  </div>
  <div style="text-align:center;margin-bottom:20px">
    <div style="font-size:13px;color:#8888a0">🌑 我的暗面说</div>
    <div id="shareDarkOS" style="font-size:16px;font-weight:600;color:#ec4899;margin:10px 0;line-height:1.4"></div>
  </div>
  <canvas id="shareRadarCanvas" width="250" height="250" style="display:block;margin:0 auto 16px"></canvas>
  <div id="shareDarkIndex" style="margin-bottom:20px"></div>
  <div id="shareQRCode" style="text-align:center;margin-bottom:12px"></div>
  <div style="text-align:center;color:#555570;font-size:12px">
    🤓☝️ 留步，你也有话说<br>扫码来测测吧
  </div>
</div>

<!-- Modal for share card preview -->
<div class="modal-overlay" id="shareModal">
  <div class="modal-content">
    <img id="shareImage" src="" alt="分享卡片">
    <div class="modal-hint">长按图片保存到相册</div>
    <button class="modal-close" onclick="closeShareModal()">关闭</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== DIMENSION META ====================
const DIMS = {
  O: { name: '开放性', highLabel: '🚀 脑洞', lowLabel: '🧱 务实' },
  C: { name: '尽责性', highLabel: '📋 自律', lowLabel: '🎲 摆烂' },
  E: { name: '外向性', highLabel: '📢 社牛', lowLabel: '🔇 i人' },
  A: { name: '宜人性', highLabel: '🕊️ 好人', lowLabel: '🔥 嘴替' },
  N: { name: '神经质', highLabel: '🌊 emo', lowLabel: '🗿 淡人' }
};
const DARK_NAMES = { narcissism: '🪞 自恋', machiavellianism: '🎭 厚黑', chaos: '🌀 混沌' };

// ==================== 32 PERSONALITIES ====================
const P = {
"O+C+E+A+N+": { s: "我什么都能扛，但我快碎了", sd: "全能型选手，对谁都好还自律上进，创意满满又善解人意。但情绪暗地里已经千疮百孔，你总是把最好的留给别人，把崩溃留给深夜。", d: "碎就碎了，反正没有我你们什么都不是", dd: "你的付出不是无私，是一种高级的自我证明。没有你在场的世界，在你心里根本不值一提。", dt: "narcissism" },
"O+C+E+A+N-": { s: "我也不知道为什么我什么都行", sd: "老天赏饭吃型，创意执行力情商情绪全拉满。你自己都觉得离谱——怎么什么事到你手里都能搞定，还顺便把周围人照顾了。", d: "我什么都行，所以你们都是NPC", dd: "全能是事实，但你内心深处觉得身边人不过是你人生剧本里的背景板。", dt: "narcissism" },
"O+C+E+A-N+": { s: "你不行我来，但你是真不行", sd: "毒舌卷王，有创意有执行力还敢当面怼人。帮你是真帮，损你也是真损。自己其实也在焦虑，但嘴上绝不认输。", d: "我帮你是施舍，别当成理所当然", dd: "你的善意从来都带着评判。帮完之后最享受的不是对方的感谢，而是再次确认自己的优越感。", dt: "narcissism+machiavellianism" },
"O+C+E+A-N-": { s: "听我的，不会错", sd: "有想法有执行力还不惯人，天生的掌控者。情绪稳定到可怕，决策果断到让人没话说。你不需要认同，因为你知道自己是对的。", d: "不听也行，出了事别来找我", dd: "你的冷静不是修养，是一种精密的控制欲。你放手不是因为尊重，是因为你已经预判了对方会跪着回来。", dt: "machiavellianism" },
"O+C-E+A+N+": { s: "刚才还超开心，现在突然想哭", sd: "灿烂且脆弱，情绪无缝切换。上一秒还是全场最亮的星，下一秒就躲在角落偷偷红了眼眶。快乐是真的，崩溃也是真的。", d: "我哭是因为这个世界配不上我", dd: "你的眼泪不是脆弱，而是一种无声的控诉——这个粗糙的世界配不上你这么细腻的灵魂。", dt: "narcissism+chaos" },
"O+C-E+A+N-": { s: "活着就是用来玩的啊", sd: "佛系快乐怪，不卷但脑洞大开。对人温柔还心态好，令人嫉妒的松弛感。你活成了所有人梦想中的样子——轻松、有趣、不累。", d: "你们认真的样子真好笑", dd: "你的快乐建立在一种隐秘的优越感上：看着别人拼命内卷，你觉得他们既可怜又好笑。", dt: "narcissism" },

"O+C-E+A-N-": { s: "这事绝了——算了我不干了", sd: "满脑子好点子但永远不执行，嘴上谁都不服，身体很诚实。你不是不行，你是觉得动手太掉价。", d: "不是我不行，是这个世界不配让我出手", dd: "你把摆烂包装成了一种姿态——不是懒，是世界不值得你认真对待。", dt: "narcissism" },
"O+C+E-A+N+": { s: "我没事。（其实已经裂开了）", sd: "什么都往心里装，默默卷死所有人。表面平静内心海啸，你永远是那个说「没事」但其实最需要被关心的人。", d: "我替你们扛了所有，但没人会知道", dd: "你的隐忍不是善良，是一种沉默的记账。每一次「没事」都在心里记了一笔，总有一天会清算。", dt: "machiavellianism+narcissism" },

// ==================== STATE ====================
let activeQuestions = []; // dynamically built question list
let currentQ = 0;
let answers = [];
let resultData = null;

// ==================== PAGE NAVIGATION ====================
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ==================== ADAPTIVE ENGINE ====================
function buildRound1() {
  // Interleave: Big Five and Dark Triad for variety
  const bf = ['E','O','C','A','N'];
  const dt = ['narcissism','machiavellianism','chaos'];
  const seq = [];
  // E, O, narcissism, C, A, machiavellianism, N, chaos
  seq.push(Q_BANK.E.r1);
  seq.push(Q_BANK.O.r1);
  seq.push(Q_BANK.narcissism.r1);
  seq.push(Q_BANK.C.r1);
  seq.push(Q_BANK.A.r1);
  seq.push(Q_BANK.machiavellianism.r1);
  seq.push(Q_BANK.N.r1);
  seq.push(Q_BANK.chaos.r1);
  return seq;
}

function buildRound2() {
  // Check Round 1 answers: if score == 1 (ambiguous), add follow-up
  const round2 = [];
  const allDims = ['E','O','C','A','N','narcissism','machiavellianism','chaos'];

  answers.filter(Boolean).forEach((a, i) => {
    const dim = a.dim;
    const scoreVal = Object.values(a.scores)[0]; // each q has one dim score
    // Ambiguous = scored 1 (middle ground)
    if (scoreVal === 1 && Q_BANK[dim] && Q_BANK[dim].r2) {
      round2.push(Q_BANK[dim].r2);
    }
  });

  return round2;
}

// ==================== QUIZ LOGIC ====================
function startQuiz() {
  currentQ = 0;
  answers = [];
  resultData = null;
  activeQuestions = buildRound1();
  showSection('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = activeQuestions[currentQ];
  const total = activeQuestions.length;
  const pct = Math.round(((currentQ + 1) / total) * 100);
  document.getElementById('progressText').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progressPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  const qText = document.getElementById('questionText');
  const optList = document.getElementById('optionsList');

  // Show/hide prev button
  const btnPrev = document.getElementById('btnPrev');
  if (currentQ > 0) btnPrev.classList.add('visible');
  else btnPrev.classList.remove('visible');

  qText.classList.add('fade-out');
  setTimeout(() => {
    qText.textContent = q.q;
    qText.classList.remove('fade-out');
    optList.innerHTML = '';
    const savedAnswer = answers[currentQ];
    q.opts.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      if (savedAnswer && savedAnswer.selectedIdx === idx) {
        btn.classList.add('selected');
      }
      btn.textContent = opt.t;
      btn.addEventListener('click', () => selectOption(idx));
      optList.appendChild(btn);
    });
    if (document.activeElement) document.activeElement.blur();
  }, 150);
}

function selectOption(idx) {
  const q = activeQuestions[currentQ];
  const opt = q.opts[idx];

  const currentBtns = document.getElementById('optionsList').querySelectorAll('.option-btn');
  currentBtns.forEach(b => b.classList.remove('selected'));
  if (currentBtns[idx]) currentBtns[idx].classList.add('selected');

  answers[currentQ] = { dim: q.dim, scores: opt.sc, selectedIdx: idx };

  if (document.activeElement) document.activeElement.blur();

  setTimeout(() => {
    currentQ++;

    // After finishing Round 1 (8 questions), dynamically append Round 2
    if (currentQ === 8 && activeQuestions.length === 8) {
      const r2 = buildRound2();
      if (r2.length > 0) {
        activeQuestions = activeQuestions.concat(r2);
      }
    }

    if (currentQ < activeQuestions.length) {
      renderQuestion();
    } else {
      finishQuiz();
    }
  }, 300);
}

function prevQuestion() {
  if (currentQ > 0) {
    // If going back into Round 1 from Round 2, trim Round 2 questions
    // (they'll be recalculated when we move forward again)
    if (currentQ <= 8 && activeQuestions.length > 8) {
      activeQuestions = activeQuestions.slice(0, 8);
      answers = answers.slice(0, 8);
    }
    currentQ--;
    renderQuestion();
  }
}

function finishQuiz() {
  showSection('loading');
  setTimeout(() => {
    computeResult();
    renderResult();
    showSection('result');
  }, 2500);
}

// ==================== SCORING ENGINE ====================
function computeResult() {
  // Accumulate scores per dimension
  const bigFive = { O: 0, C: 0, E: 0, A: 0, N: 0 };
  const bigFiveCount = { O: 0, C: 0, E: 0, A: 0, N: 0 };
  const bigFiveLastOpt = { O: 0, C: 0, E: 0, A: 0, N: 0 };
  const darkTriad = { narcissism: 0, machiavellianism: 0, chaos: 0 };
  const darkCount = { narcissism: 0, machiavellianism: 0, chaos: 0 };

  answers.filter(Boolean).forEach(a => {
    for (const [dim, score] of Object.entries(a.scores)) {
      if (dim in bigFive) {
        bigFive[dim] += score;
        bigFiveCount[dim]++;
        bigFiveLastOpt[dim] = score;
      }
      if (dim in darkTriad) {
        darkTriad[dim] += score;
        darkCount[dim]++;
      }
    }
  });

  // Normalize Big Five to 0-10 scale regardless of 1 or 2 questions answered
  const bigFiveNorm = {};
  for (const dim of ['O','C','E','A','N']) {
    const maxPossible = bigFiveCount[dim] * 2; // each q max score is 2
    bigFiveNorm[dim] = maxPossible > 0 ? Math.round((bigFive[dim] / maxPossible) * 10) : 5;
  }

  // Binary split on normalized scores
  const signs = {};
  for (const dim of ['O','C','E','A','N']) {
    if (bigFiveNorm[dim] >= 6) signs[dim] = '+';
    else if (bigFiveNorm[dim] <= 4) signs[dim] = '-';
    else signs[dim] = bigFiveLastOpt[dim] >= 1 ? '+' : '-';
  }

  // Personality code
  const code = ['O','C','E','A','N'].map(d => d + signs[d]).join('');
  const personality = P[code];

  // Dark Triad percentages (normalize based on actual questions answered)
  const darkPct = {};
  let darkTotal = 0, darkTotalMax = 0;
  for (const [k, v] of Object.entries(darkTriad)) {
    const maxPossible = darkCount[k] * 2;
    darkPct[k] = maxPossible > 0 ? Math.round((v / maxPossible) * 100) : 0;
    darkTotal += v;
    darkTotalMax += maxPossible;
  }
  const darkTotalPct = darkTotalMax > 0 ? Math.round((darkTotal / darkTotalMax) * 100) : 0;

  // Dominant dark side
  let dominant = 'narcissism';
  if (darkPct.machiavellianism > darkPct[dominant]) dominant = 'machiavellianism';
  if (darkPct.chaos > darkPct[dominant]) dominant = 'chaos';

  resultData = {
    code, personality, bigFive: bigFiveNorm, signs, darkPct, darkTotalPct, dominant
  };
}

// ==================== RESULT RENDERING ====================
function renderResult() {
  const r = resultData;
  const p = r.personality;

  // Surface OS
  document.getElementById('surfaceOS').textContent = `"${p.s}"`;
  document.getElementById('surfaceDesc').textContent = p.sd;

  // Dark OS (hidden initially)
  const prefix = r.darkTotalPct >= 60 ? '' : r.darkTotalPct >= 40 ? '偶尔你也会想……' : '在深夜某个瞬间，你可能闪过……';
  document.getElementById('darkPrefix').textContent = prefix;
  document.getElementById('darkOS').textContent = `"${p.d}"`;
  document.getElementById('darkDesc').textContent = p.dd;

  const dtLabels = p.dt.split('+').map(k => DARK_NAMES[k] || k).join(' × ');
  document.getElementById('darkTypeBadge').textContent = `主导暗面：${dtLabels}`;

  // Reset dark reveal state
  document.getElementById('darkContent').classList.add('hidden');
  document.getElementById('darkOverlay').classList.remove('revealed');

  // Radar chart
  drawRadar('radarCanvas', r.bigFive, 300);

  // Dark index bars
  renderDarkIndex(r);
}

function revealDarkOS() {
  document.getElementById('darkOverlay').classList.add('revealed');
  document.getElementById('darkContent').classList.remove('hidden');
}

// ==================== RADAR CHART ====================
function drawRadar(canvasId, scores, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const maxR = size * 0.35;
  const dims = ['O', 'C', 'E', 'A', 'N'];
  const n = dims.length;

  ctx.clearRect(0, 0, size, size);

  // Angles (start from top, clockwise)
  const angles = dims.map((_, i) => (Math.PI * 2 * i / n) - Math.PI / 2);

  // Grid lines
  for (let level = 1; level <= 5; level++) {
    const r = (level / 5) * maxR;
    ctx.beginPath();
    angles.forEach((a, i) => {
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.strokeStyle = 'rgba(100, 100, 160, 0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axis lines
  angles.forEach(a => {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + maxR * Math.cos(a), cy + maxR * Math.sin(a));
    ctx.strokeStyle = 'rgba(100, 100, 160, 0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Data polygon
  ctx.beginPath();
  dims.forEach((dim, i) => {
    const val = scores[dim] / 10;
    const r = val * maxR;
    const x = cx + r * Math.cos(angles[i]);
    const y = cy + r * Math.sin(angles[i]);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();

  // Gradient fill
  const grad = ctx.createLinearGradient(cx - maxR, cy - maxR, cx + maxR, cy + maxR);
  grad.addColorStop(0, 'rgba(168, 85, 247, 0.3)');
  grad.addColorStop(0.5, 'rgba(99, 102, 241, 0.3)');
  grad.addColorStop(1, 'rgba(236, 72, 153, 0.3)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Outline
  ctx.strokeStyle = 'rgba(168, 85, 247, 0.8)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Data points
  dims.forEach((dim, i) => {
    const val = scores[dim] / 10;
    const r = val * maxR;
    const x = cx + r * Math.cos(angles[i]);
    const y = cy + r * Math.sin(angles[i]);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#a855f7';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Labels
  ctx.font = '13px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  dims.forEach((dim, i) => {
    const labelR = maxR + 28;
    const x = cx + labelR * Math.cos(angles[i]);
    const y = cy + labelR * Math.sin(angles[i]);
    const info = DIMS[dim];
    const label = scores[dim] >= 6 ? info.highLabel : info.lowLabel;
    ctx.fillStyle = '#8888a0';
    ctx.fillText(label, x, y - 8);
    ctx.fillStyle = '#555570';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText(`${scores[dim]}/10`, x, y + 8);
    ctx.font = '13px -apple-system, sans-serif';
  });
}

// ==================== DARK INDEX BARS ====================
function renderDarkIndex(r) {
  const container = document.getElementById('darkIndexSection');
  container.innerHTML = '';

  // Total
  container.innerHTML += createDarkBar('暗黑总分', r.darkTotalPct, 'total', false);
  // Each dimension
  for (const [key, pct] of Object.entries(r.darkPct)) {
    const isDominant = key === r.dominant;
    container.innerHTML += createDarkBar(DARK_NAMES[key], pct, key, isDominant);
  }

  // Animate bars
  setTimeout(() => {
    container.querySelectorAll('.dark-index-fill').forEach(el => {
      el.style.width = el.dataset.width;
    });
  }, 100);
}

function createDarkBar(name, pct, cssClass, isDominant) {
  const badge = isDominant ? `<span class="dominant-badge">主导暗面</span>` : '';
  return `<div class="dark-index-item">
    <div class="dark-index-label">
      <span class="dark-index-name">${name}${badge}</span>
      <span class="dark-index-value">${pct}%</span>
    </div>
    <div class="dark-index-track">
      <div class="dark-index-fill ${cssClass}" style="width:0" data-width="${pct}%"></div>
    </div>
  </div>`;
}

// ==================== SHARE FUNCTIONS ====================
function generateShareCard() {
  if (!resultData) return;
  const p = resultData.personality;

  // Populate share card template
  document.getElementById('shareOS').textContent = `"${p.s}"`;
  document.getElementById('shareDarkOS').textContent = `"${p.d}"`;

  // Draw mini radar on share canvas
  drawRadar('shareRadarCanvas', resultData.bigFive, 250);

  // Dark index summary
  const di = document.getElementById('shareDarkIndex');
  di.innerHTML = `<div style="text-align:center;font-size:13px;color:#8888a0">暗黑指数 ${resultData.darkTotalPct}% | ${DARK_NAMES[resultData.dominant]} 主导</div>`;

  // Generate QR code for share card
  const qrContainer = document.getElementById('shareQRCode');
  qrContainer.innerHTML = '';
  const SITE_URL = 'https://aruun1212.github.io/personality-test/';
  const qr = qrcode(0, 'M');
  qr.addData(SITE_URL);
  qr.make();
  const qrImg = document.createElement('img');
  qrImg.src = qr.createDataURL(4, 0);
  qrImg.style.cssText = 'width:100px;height:100px;border-radius:8px;image-rendering:pixelated;';
  qrContainer.appendChild(qrImg);

  // Generate image
  const template = document.getElementById('shareCardTemplate');
  template.style.left = '0';
  template.style.top = '0';
  template.style.zIndex = '-1';

  html2canvas(template, {
    scale: 2,
    backgroundColor: '#0a0a0f',
    useCORS: true,
    width: template.offsetWidth,
    height: template.offsetHeight,
    x: 0,
    y: 0,
    scrollX: 0,
    scrollY: 0,
    windowWidth: template.offsetWidth,
    windowHeight: template.offsetHeight
  }).then(canvas => {
    template.style.left = '-9999px';
    template.style.zIndex = '';
    const img = document.getElementById('shareImage');
    img.src = canvas.toDataURL('image/png');
    document.getElementById('shareModal').classList.add('active');
  }).catch(err => {
    template.style.left = '-9999px';
    template.style.zIndex = '';
    showToast('生成失败，请尝试复制文案分享');
  });
}

function closeShareModal() {
  document.getElementById('shareModal').classList.remove('active');
}

function copyShareText() {
  if (!resultData) return;
  const p = resultData.personality;
  const SITE_URL = 'https://aruun1212.github.io/personality-test/';
  const text = `🤓☝️ 留步，你也有话说\n\n☀️ 我的内心OS是：\n"${p.s}"\n\n🌑 但我的暗面说：\n[点击揭示你的暗面]\n\n暗黑指数：${resultData.darkTotalPct}% | ${DARK_NAMES[resultData.dominant]} 主导\n\n🔗 你也来测测：${SITE_URL}`;

  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ 已复制到剪贴板');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 已复制到剪贴板');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ==================== RESTART ====================
function restartQuiz() {
  currentQ = 0;
  answers = [];
  resultData = null;
  showSection('landing');
}
